<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🏛️ Pantheon Village — OpenClaw Agents</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@400;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold: #d4af37;
      --gold-dim: #9a7a1a;
      --atlas: #4A90D9;
      --vulkan: #FF6B35;
      --saga: #9B59B6;
      --cerbero: #7F8C8D;
      --bg: #07070f;
      --panel-bg: rgba(5, 5, 18, 0.92);
      --border: rgba(212, 175, 55, 0.2);
    }

    body {
      background: var(--bg);
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
      color: #e8e0d0;
    }

    #canvas-container { position: fixed; inset: 0; }
    canvas { display: block; }

    /* ── LOADING ── */
    #loading {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 999; gap: 20px;
      transition: opacity 0.8s;
    }
    #loading .loading-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: 2rem; color: var(--gold);
      text-shadow: 0 0 40px rgba(212,175,55,0.8), 0 0 80px rgba(212,175,55,0.4);
      letter-spacing: 0.3em;
      animation: pulse-glow 2s ease-in-out infinite;
    }
    @keyframes pulse-glow {
      0%,100% { text-shadow: 0 0 20px rgba(212,175,55,0.6); }
      50% { text-shadow: 0 0 60px rgba(212,175,55,1), 0 0 120px rgba(212,175,55,0.5); }
    }
    #loading p { color: #9090b0; font-size: 0.85rem; letter-spacing: 0.15em; text-transform: uppercase; }
    #loading-models { color: #6060a0; font-size: 0.72rem; letter-spacing: 0.1em; margin-top: -10px; min-height: 1.2em; }
    .spinner {
      width: 56px; height: 56px;
      border: 3px solid rgba(212,175,55,0.15);
      border-top-color: var(--gold); border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── HEADER ── */
    #header {
      position: fixed; top: 0; left: 0; right: 0;
      padding: 14px 24px;
      background: linear-gradient(180deg, rgba(4,4,14,0.98) 0%, rgba(4,4,14,0.7) 60%, transparent 100%);
      display: flex; align-items: center; justify-content: space-between;
      z-index: 100; pointer-events: none;
      border-bottom: 1px solid rgba(212,175,55,0.08);
    }
    #header .brand { display: flex; flex-direction: column; }
    #header h1 {
      font-family: 'Cinzel Decorative', serif;
      font-size: 1.2rem; font-weight: 700; letter-spacing: 0.25em;
      color: var(--gold); text-shadow: 0 0 30px rgba(212,175,55,0.6);
    }
    #header .subtitle { font-size: 0.62rem; color: #6060a0; letter-spacing: 0.2em; text-transform: uppercase; margin-top: 2px; }
    #ws-status {
      font-size: 0.68rem; padding: 5px 14px; border-radius: 20px; border: 1px solid;
      letter-spacing: 0.08em; pointer-events: none; backdrop-filter: blur(8px);
    }
    #ws-status.connected    { color: #4ade80; border-color: rgba(74,222,128,0.3); background: rgba(74,222,128,0.07); }
    #ws-status.disconnected { color: #f87171; border-color: rgba(248,113,113,0.3); background: rgba(248,113,113,0.07); }

    /* ── SIDE PANEL ── */
    #side-panel {
      position: fixed; right: 0; top: 0; bottom: 0; width: 280px;
      background: var(--panel-bg); border-left: 1px solid var(--border);
      z-index: 100; display: flex; flex-direction: column;
      backdrop-filter: blur(16px);
      transform: translateX(0); transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
    }
    #side-panel.hidden { transform: translateX(100%); }
    .side-panel-header {
      padding: 70px 20px 16px; border-bottom: 1px solid rgba(212,175,55,0.1);
      font-family: 'Cinzel', serif; font-size: 0.65rem; color: var(--gold-dim);
      letter-spacing: 0.25em; text-transform: uppercase;
    }
    #agent-list {
      flex: 1; overflow-y: auto; padding: 12px;
      display: flex; flex-direction: column; gap: 10px;
    }
    #agent-list::-webkit-scrollbar { width: 4px; }
    #agent-list::-webkit-scrollbar-thumb { background: rgba(212,175,55,0.2); border-radius: 2px; }
    .agent-card {
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px; padding: 12px 14px; cursor: pointer;
      transition: all 0.3s; position: relative; overflow: hidden;
    }
    .agent-card::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, transparent 0%, rgba(255,255,255,0.03) 100%);
      pointer-events: none;
    }
    .agent-card:hover { border-color: rgba(212,175,55,0.3); background: rgba(255,255,255,0.05); transform: translateX(-2px); }
    .agent-card.thinking { border-color: rgba(255,200,50,0.5); box-shadow: 0 0 20px rgba(255,200,50,0.1), inset 0 0 20px rgba(255,200,50,0.05); animation: pulse-card 1.2s ease-in-out infinite; }
    .agent-card.responding { border-color: rgba(100,255,150,0.5); box-shadow: 0 0 20px rgba(100,255,150,0.1); }
    @keyframes pulse-card {
      0%,100% { box-shadow: 0 0 10px rgba(255,200,50,0.05); }
      50% { box-shadow: 0 0 30px rgba(255,200,50,0.2), inset 0 0 15px rgba(255,200,50,0.08); }
    }
    .agent-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .agent-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; border: 2px solid; flex-shrink: 0; position: relative;
    }
    .agent-avatar .pulse-ring {
      position: absolute; inset: -4px; border-radius: 50%;
      border: 2px solid currentColor; opacity: 0;
    }
    .agent-card.thinking .pulse-ring { animation: ring-pulse 1s ease-out infinite; }
    @keyframes ring-pulse {
      0% { transform: scale(0.9); opacity: 0.8; }
      100% { transform: scale(1.4); opacity: 0; }
    }
    .agent-info { flex: 1; min-width: 0; }
    .agent-name { font-family: 'Cinzel', serif; font-size: 0.82rem; font-weight: 600; letter-spacing: 0.05em; }
    .agent-zone { font-size: 0.6rem; color: #606080; letter-spacing: 0.08em; }
    .status-badge {
      font-size: 0.58rem; padding: 3px 8px; border-radius: 10px;
      text-transform: uppercase; letter-spacing: 0.1em; white-space: nowrap;
    }
    .status-badge.idle       { background: rgba(255,255,255,0.05); color: #50506a; }
    .status-badge.thinking   { background: rgba(255,200,50,0.12);  color: #ffd700; }
    .status-badge.responding { background: rgba(100,255,150,0.12); color: #4ade80; }
    .agent-message-preview {
      font-size: 0.68rem; color: #8080a0; line-height: 1.45;
      overflow: hidden; display: -webkit-box;
      -webkit-line-clamp: 2; -webkit-box-orient: vertical; min-height: 2em;
    }
    .agent-message-preview.response { color: #a0c0a0; }
    .agent-time { margin-top: 6px; font-size: 0.58rem; color: #404060; }

    /* ── BOTTOM BAR ── */
    #bottom-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 12px 16px;
      background: linear-gradient(0deg, rgba(4,4,14,0.98) 0%, transparent 100%);
      display: none; gap: 10px; z-index: 100;
      overflow-x: auto; -webkit-overflow-scrolling: touch;
    }

    /* ── FOCUS BAR ── */
    #focus-bar {
      position: fixed; top: 70px; left: 50%;
      transform: translateX(-50%) translateY(-10px);
      background: var(--panel-bg); border: 1px solid var(--border);
      border-radius: 20px; padding: 8px 20px;
      font-size: 0.75rem; color: var(--gold);
      z-index: 100; opacity: 0; pointer-events: none;
      transition: all 0.4s; backdrop-filter: blur(12px);
      font-family: 'Cinzel', serif; letter-spacing: 0.1em;
    }
    #focus-bar.visible { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── MINIMAP ── */
    #minimap {
      position: fixed; bottom: 20px; left: 20px;
      width: 120px; height: 120px;
      background: rgba(5,5,18,0.8); border: 1px solid rgba(212,175,55,0.15);
      border-radius: 50%; z-index: 100; backdrop-filter: blur(8px); overflow: hidden;
    }
    #minimap canvas { width: 100%; height: 100%; }

    /* ── TOOLTIP ── */
    #tooltip {
      position: fixed; pointer-events: none; z-index: 200;
      background: rgba(7,7,15,0.9); border: 1px solid var(--border);
      border-radius: 10px; padding: 8px 14px; font-size: 0.72rem;
      max-width: 200px; display: none; backdrop-filter: blur(12px);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      #side-panel { display: none; }
      #bottom-bar { display: flex; }
      #minimap { display: none; }
      .bottom-card {
        background: rgba(5,5,18,0.9); border: 1px solid rgba(255,255,255,0.07);
        border-radius: 12px; padding: 10px 14px; min-width: 180px; flex-shrink: 0;
      }
      .bottom-card.thinking { border-color: rgba(255,200,50,0.4); }
      .bottom-card.responding { border-color: rgba(100,255,150,0.4); }
      .bottom-card-name { font-family: 'Cinzel', serif; font-size: 0.8rem; color: var(--gold); margin-bottom: 4px; }
      .bottom-card-msg { font-size: 0.65rem; color: #8080a0; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    }

    #hint {
      position: fixed; bottom: 20px; right: 300px;
      font-size: 0.6rem; color: #40406a; z-index: 100;
      letter-spacing: 0.1em; text-align: right; pointer-events: none;
    }
    @media (max-width: 900px) { #hint { right: 20px; bottom: 120px; } }
  </style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div class="loading-title">🏛️ PANTHEON</div>
  <p>Summoning the ancient gods…</p>
  <div id="loading-models">Preparing the realm…</div>
</div>

<div id="canvas-container"></div>

<div id="header">
  <div class="brand">
    <h1>🏛️ PANTHEON</h1>
    <div class="subtitle">OpenClaw Agent Council</div>
  </div>
  <div id="ws-status" class="disconnected">⚫ Connecting…</div>
</div>

<div id="side-panel">
  <div class="side-panel-header">⚡ Council Members</div>
  <div id="agent-list"></div>
</div>

<div id="bottom-bar"></div>
<div id="focus-bar">Click anywhere to release</div>
<div id="minimap"><canvas id="minimap-canvas" width="120" height="120"></canvas></div>
<div id="hint">Click agent to zoom · Drag to orbit · Scroll to zoom</div>
<div id="tooltip"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

// ═══════════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════════
const IS_MOBILE = window.innerWidth < 900;
const DPR = Math.min(window.devicePixelRatio, IS_MOBILE ? 1.5 : 2);

const AGENTS_CFG = {
  main:    { name: 'Atlas',   emoji: '🌍', color: '#4A90D9', colorInt: 0x4A90D9, pos: [0, 0, 0],     zone: 'Center — The Throne', model: '/models/atlas.glb',   targetH: 3.2 },
  vulkan:  { name: 'Vulkan',  emoji: '🔥', color: '#FF6B35', colorInt: 0xFF6B35, pos: [-9, 0, -7],   zone: 'West — The Forge',    model: '/models/vulkan.glb',  targetH: 2.8 },
  saga:    { name: 'Saga',    emoji: '📜', color: '#9B59B6', colorInt: 0x9B59B6, pos: [9, 0, -7],    zone: 'East — The Library',  model: '/models/saga.glb',    targetH: 2.9 },
  cerbero: { name: 'Cerbero', emoji: '🐕', color: '#7F8C8D', colorInt: 0x7F8C8D, pos: [0, 0, 10],   zone: 'South — The Gate',    model: '/models/cerbero.glb', targetH: 2.0 },
};

// ═══════════════════════════════════════════════════════════════
// RENDERER + SCENE
// ═══════════════════════════════════════════════════════════════
const container = document.getElementById('canvas-container');
const renderer = new THREE.WebGLRenderer({ antialias: !IS_MOBILE, alpha: false, powerPreference: 'high-performance' });
renderer.setPixelRatio(DPR);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = IS_MOBILE ? THREE.BasicShadowMap : THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
renderer.outputColorSpace = THREE.SRGBColorSpace;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x090912, 0.013);
scene.background = new THREE.Color(0x060610);

const camera = new THREE.PerspectiveCamera(52, window.innerWidth / window.innerHeight, 0.1, 300);
camera.position.set(0, 20, 32);
camera.lookAt(0, 0, 0);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.07;
controls.minDistance = 6;
controls.maxDistance = 70;
controls.maxPolarAngle = Math.PI / 2.05;
controls.target.set(0, 2, 0);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
  bloomPass.setSize(window.innerWidth, window.innerHeight);
});

// ═══════════════════════════════════════════════════════════════
// BLOOM POST-PROCESSING
// ═══════════════════════════════════════════════════════════════
const composer = new EffectComposer(renderer);
const renderPass = new RenderPass(scene, camera);
composer.addPass(renderPass);

const bloomPass = new UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight),
  0.45,  // strength
  0.7,   // radius
  0.72   // threshold — only very bright emissives bloom
);
composer.addPass(bloomPass);

const outputPass = new OutputPass();
composer.addPass(outputPass);

// ═══════════════════════════════════════════════════════════════
// CAMERA AUTO-ORBIT + FOCUS
// ═══════════════════════════════════════════════════════════════
let autoOrbit = true;
let autoOrbitTimer = null;
let focusTarget = null;
let cameraBaseAngle = 0;
const ORBIT_SPEED = 0.06;

function resetAutoOrbit() {
  autoOrbit = false;
  clearTimeout(autoOrbitTimer);
  autoOrbitTimer = setTimeout(() => { if (!focusTarget) autoOrbit = true; }, 4000);
}
controls.addEventListener('start', resetAutoOrbit);

// ═══════════════════════════════════════════════════════════════
// LIGHTS
// ═══════════════════════════════════════════════════════════════
const ambient = new THREE.AmbientLight(0x1a1830, 3.5);
scene.add(ambient);

const moonLight = new THREE.DirectionalLight(0x8899cc, 1.8);
moonLight.position.set(-15, 40, -20);
moonLight.castShadow = true;
moonLight.shadow.mapSize.set(IS_MOBILE ? 1024 : 2048, IS_MOBILE ? 1024 : 2048);
moonLight.shadow.camera.near = 1;
moonLight.shadow.camera.far = 120;
moonLight.shadow.camera.left = -35; moonLight.shadow.camera.right = 35;
moonLight.shadow.camera.top = 35; moonLight.shadow.camera.bottom = -35;
moonLight.shadow.bias = -0.001;
scene.add(moonLight);

const fillLight = new THREE.DirectionalLight(0xffcc88, 0.4);
fillLight.position.set(5, -5, 10);
scene.add(fillLight);

const torchLights = [];
const COL_RADIUS = 17;
const TORCH_COUNT = IS_MOBILE ? 4 : 8;

for (let i = 0; i < TORCH_COUNT; i++) {
  const angle = (i / TORCH_COUNT) * Math.PI * 2 + Math.PI / TORCH_COUNT;
  const x = Math.cos(angle) * COL_RADIUS;
  const z = Math.sin(angle) * COL_RADIUS;
  const tl = new THREE.PointLight(0xff8833, 4, 14);
  tl.position.set(x, 9.2, z);
  tl.userData.flicker = Math.random() * Math.PI * 2;
  scene.add(tl);
  torchLights.push(tl);
}

const agentSpots = {};
for (const [id, cfg] of Object.entries(AGENTS_CFG)) {
  const spot = new THREE.SpotLight(cfg.colorInt, 2.5, 18, Math.PI / 6, 0.4, 1.5);
  spot.position.set(cfg.pos[0], 14, cfg.pos[2]);
  spot.target.position.set(cfg.pos[0], 0, cfg.pos[2]);
  spot.castShadow = false;
  scene.add(spot); scene.add(spot.target);
  agentSpots[id] = spot;
}

// ═══════════════════════════════════════════════════════════════
// PROCEDURAL TEXTURES
// ═══════════════════════════════════════════════════════════════
function makeMarbleTexture(size = 512, dark = false) {
  const canvas = document.createElement('canvas');
  canvas.width = canvas.height = size;
  const ctx = canvas.getContext('2d');
  const base = dark ? '#c0b8a8' : '#e0d8cc';
  ctx.fillStyle = base; ctx.fillRect(0, 0, size, size);
  for (let i = 0; i < 18; i++) {
    const x1 = Math.random()*size, y1 = Math.random()*size;
    const x2 = Math.random()*size, y2 = Math.random()*size;
    const cx1 = Math.random()*size, cy1 = Math.random()*size;
    const cx2 = Math.random()*size, cy2 = Math.random()*size;
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.bezierCurveTo(cx1,cy1,cx2,cy2,x2,y2);
    const a = 0.05 + Math.random() * 0.2;
    ctx.strokeStyle = dark ? `rgba(80,70,55,${a})` : `rgba(120,100,80,${a})`;
    ctx.lineWidth = 0.4 + Math.random() * 3; ctx.stroke();
  }
  for (let i = 0; i < 40; i++) {
    const x1 = Math.random()*size, y1 = Math.random()*size;
    const x2 = x1 + (Math.random()-0.5)*size*0.5;
    const y2 = y1 + (Math.random()-0.5)*size*0.5;
    ctx.beginPath(); ctx.moveTo(x1,y1);
    ctx.quadraticCurveTo((x1+x2)/2+(Math.random()-0.5)*60,(y1+y2)/2+(Math.random()-0.5)*60,x2,y2);
    ctx.strokeStyle = dark ? `rgba(70,60,45,${0.03+Math.random()*0.1})` : `rgba(160,140,110,${0.04+Math.random()*0.12})`;
    ctx.lineWidth = 0.2 + Math.random()*1; ctx.stroke();
  }
  const tex = new THREE.CanvasTexture(canvas);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(3, 3);
  return tex;
}

function makeGlobeTexture(size = 512) {
  const canvas = document.createElement('canvas');
  canvas.width = size; canvas.height = size/2;
  const ctx = canvas.getContext('2d');
  const grad = ctx.createLinearGradient(0,0,0,size/2);
  grad.addColorStop(0,'#0a4080'); grad.addColorStop(0.5,'#1566aa'); grad.addColorStop(1,'#0a3070');
  ctx.fillStyle = grad; ctx.fillRect(0,0,size,size/2);
  ctx.fillStyle = '#2a7a3a';
  const continents = [[0.15,0.35,0.09,0.14],[0.45,0.3,0.08,0.18],[0.65,0.35,0.1,0.14],[0.8,0.62,0.07,0.09],[0.5,0.08,0.12,0.06]];
  for (const [cx,cy,rx,ry] of continents) {
    ctx.beginPath(); ctx.ellipse(cx*size,cy*size/2,rx*size,ry*size/2,Math.random(),0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx*size+(Math.random()-0.5)*size*0.05,cy*size/2+(Math.random()-0.5)*size*0.05,rx*size*0.6,ry*size*0.6,Math.random()*Math.PI,0,Math.PI*2);
    ctx.fillStyle='#1d6030'; ctx.fill(); ctx.fillStyle='#2a7a3a';
  }
  ctx.fillStyle='rgba(220,230,255,0.8)';
  ctx.fillRect(0,0,size,size*0.04); ctx.fillRect(0,size*0.46,size,size*0.04);
  for (let i=0;i<8;i++) {
    ctx.fillStyle='rgba(255,255,255,0.15)';
    ctx.beginPath(); ctx.ellipse(Math.random()*size,Math.random()*size/2,size*0.06,size*0.02,Math.random(),0,Math.PI*2); ctx.fill();
  }
  return new THREE.CanvasTexture(canvas);
}

const marbleTex = makeMarbleTexture(512);
const marbleDarkTex = makeMarbleTexture(512, true);

// ═══════════════════════════════════════════════════════════════
// MATERIALS
// ═══════════════════════════════════════════════════════════════
const MAT = {
  marble: new THREE.MeshStandardMaterial({ map: marbleTex, roughness: 0.25, metalness: 0.08 }),
  marbleDark: new THREE.MeshStandardMaterial({ map: marbleDarkTex, roughness: 0.35, metalness: 0.05 }),
  gold: new THREE.MeshStandardMaterial({ color: 0xd4af37, metalness: 0.95, roughness: 0.08, emissive: 0xd4af37, emissiveIntensity: 0.2 }),
  iron: new THREE.MeshStandardMaterial({ color: 0x556677, metalness: 0.85, roughness: 0.3 }),
  wood: new THREE.MeshStandardMaterial({ color: 0x5a3010, roughness: 0.9, metalness: 0.0 }),
  stone: new THREE.MeshStandardMaterial({ color: 0x5a5a6a, roughness: 0.8, metalness: 0.05 }),
  chain: new THREE.MeshStandardMaterial({ color: 0x909090, metalness: 0.9, roughness: 0.15 }),
};

function mesh(geo, mat, shadow = true) {
  const m = new THREE.Mesh(geo, mat);
  if (shadow) { m.castShadow = true; m.receiveShadow = true; }
  return m;
}

// COLUMNS + TORCHES
// ═══════════════════════════════════════════════════════════════
const torchMeshes = [];

function buildColumns() {
  const COL_N = 16;
  const colMat = new THREE.MeshStandardMaterial({ map: marbleTex, roughness: 0.3, metalness: 0.06, color: 0xf0ead8 });
  for (let i = 0; i < COL_N; i++) {
    const angle = (i/COL_N)*Math.PI*2;
    const x = Math.cos(angle)*COL_RADIUS, z = Math.sin(angle)*COL_RADIUS;
    const shaft = mesh(new THREE.CylinderGeometry(0.4,0.52,9,14), colMat);
    shaft.position.set(x,4.5,z); scene.add(shaft);
    const base = mesh(new THREE.CylinderGeometry(0.65,0.65,0.35,14), MAT.marbleDark);
    base.position.set(x,0.18,z); base.castShadow=false; scene.add(base);
    const cap = mesh(new THREE.BoxGeometry(1.3,0.45,1.3), MAT.marbleDark);
    cap.position.set(x,9.22,z); cap.castShadow=false; scene.add(cap);
    const torchIdx = i % (COL_N / TORCH_COUNT);
    if (torchIdx === 0) buildTorch(x, z, angle);
  }
  const beam = mesh(new THREE.TorusGeometry(COL_RADIUS,0.55,7,80), colMat);
  beam.rotation.x = Math.PI/2; beam.position.y = 9.6; beam.castShadow=false; scene.add(beam);
}

function buildTorch(x, z, angle) {
  const dir = { x: Math.cos(angle)*0.5, z: Math.sin(angle)*0.5 };
  const tx = x - dir.x, tz = z - dir.z;
  const bracket = mesh(new THREE.BoxGeometry(0.08,0.06,0.5), MAT.iron);
  bracket.position.set(tx,8.8,tz); bracket.rotation.y = -angle; bracket.castShadow=false; scene.add(bracket);
  const bowl = mesh(new THREE.CylinderGeometry(0.12,0.08,0.3,8), MAT.iron);
  bowl.position.set(tx,9.05,tz); bowl.castShadow=false; scene.add(bowl);
  // Layered flame for bloom effect
  const flameMat = new THREE.MeshStandardMaterial({ color: 0xff9900, emissive: 0xff7700, emissiveIntensity: 6, transparent: true, opacity: 0.9 });
  const flame = new THREE.Mesh(new THREE.ConeGeometry(0.1,0.45,6), flameMat);
  flame.position.set(tx,9.42,tz);
  flame.userData.baseY = 9.42; flame.userData.phase = Math.random()*Math.PI*2;
  flame.castShadow = false; scene.add(flame); torchMeshes.push(flame);
  // Inner hot core
  const coreMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xffee00, emissiveIntensity: 8, transparent: true, opacity: 0.7 });
  const core = new THREE.Mesh(new THREE.ConeGeometry(0.04,0.2,5), coreMat);
  core.position.set(tx,9.38,tz); core.castShadow=false; scene.add(core);
  core.userData.isFlameCore = true; core.userData.phase = flame.userData.phase;
  torchMeshes.push(core);
}

// WATER POOL
// ═══════════════════════════════════════════════════════════════
let waterMesh;
function buildWaterPool() {
  const basinMat = new THREE.MeshStandardMaterial({ color: 0x3a3a5a, roughness: 0.4 });
  const outer = mesh(new THREE.CylinderGeometry(3.5,3.5,0.5,40), basinMat);
  outer.position.set(0,-0.05,5.5); outer.castShadow=false; scene.add(outer);
  const inner = mesh(new THREE.CylinderGeometry(3.2,3.2,0.45,40), new THREE.MeshStandardMaterial({ color: 0x0a1a2a, roughness: 0.2 }));
  inner.position.set(0,-0.02,5.5); inner.castShadow=false; scene.add(inner);
  const waterGeo = new THREE.CircleGeometry(3.1,40);
  const waterMat = new THREE.ShaderMaterial({
    transparent: true,
    uniforms: {
      time: { value: 0 },
      colorDeep: { value: new THREE.Color(0x0a1e3a) },
      colorShallow: { value: new THREE.Color(0x1a3a6a) },
    },
    vertexShader: `varying vec2 vUv; void main() { vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
    fragmentShader: `
      uniform float time; uniform vec3 colorDeep,colorShallow; varying vec2 vUv;
      float wave(vec2 p,float t){ return 0.5+0.5*sin(p.x*6.0+t*1.5)*cos(p.y*5.0+t*1.2)*sin(length(p)*4.0-t*2.0); }
      void main(){
        vec2 uv=vUv*2.0-1.0;
        float w=wave(uv,time)*0.5+wave(uv*1.3+0.7,time*1.1)*0.5;
        vec3 col=mix(colorDeep,colorShallow,w*0.5+0.3);
        // Reflection shimmer
        float shimmer=pow(max(0.0,sin(uv.x*8.0+time*3.0)*cos(uv.y*7.0+time*2.3)),3.0)*0.4;
        col+=vec3(shimmer*0.3,shimmer*0.5,shimmer*1.0);
        float dist=length(uv); float alpha=smoothstep(1.0,0.85,dist)*0.88;
        gl_FragColor=vec4(col,alpha);
      }
    `,
  });
  waterMesh = new THREE.Mesh(waterGeo, waterMat);
  waterMesh.rotation.x = -Math.PI/2; waterMesh.position.set(0,0.22,5.5); scene.add(waterMesh);
  const wl = new THREE.PointLight(0x3366ff,1.2,8);
  wl.position.set(0,1.5,5.5); scene.add(wl);
}

// ═══════════════════════════════════════════════════════════════
let starMaterial;
function buildSky() {
  const skyGeo = new THREE.SphereGeometry(150,32,18);
  const skyMat = new THREE.ShaderMaterial({
    side: THREE.BackSide,
    vertexShader: `varying vec3 vWorldPos; void main(){ vWorldPos=position; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
    fragmentShader: `varying vec3 vWorldPos; void main(){
      float t=clamp((vWorldPos.y+30.0)/130.0,0.0,1.0);
      vec3 bottom=vec3(0.04,0.03,0.10),mid=vec3(0.06,0.05,0.18),top=vec3(0.02,0.04,0.20);
      vec3 col=t<0.4?mix(bottom,mid,t/0.4):mix(mid,top,(t-0.4)/0.6);
      gl_FragColor=vec4(col,1.0);
    }`,
  });
  scene.add(new THREE.Mesh(skyGeo, skyMat));

  const starCount = IS_MOBILE ? 1200 : 2500;
  const positions = new Float32Array(starCount*3);
  const sizes = new Float32Array(starCount);
  const phases = new Float32Array(starCount);
  for (let i=0;i<starCount;i++) {
    const theta=Math.random()*Math.PI*2, phi=Math.acos(2*Math.random()-1), r=110+Math.random()*25;
    positions[i*3]=r*Math.sin(phi)*Math.cos(theta);
    positions[i*3+1]=Math.abs(r*Math.cos(phi));
    positions[i*3+2]=r*Math.sin(phi)*Math.sin(theta);
    sizes[i]=0.5+Math.random()*2.5; phases[i]=Math.random()*Math.PI*2;
  }
  const starGeo = new THREE.BufferGeometry();
  starGeo.setAttribute('position', new THREE.BufferAttribute(positions,3));
  starGeo.setAttribute('size', new THREE.BufferAttribute(sizes,1));
  starGeo.setAttribute('phase', new THREE.BufferAttribute(phases,1));
  starMaterial = new THREE.ShaderMaterial({
    uniforms: { time: { value: 0 } },
    vertexShader: `attribute float size,phase; varying float vAlpha; uniform float time;
      void main(){ vAlpha=0.5+0.5*sin(phase+time*1.5+phase*3.0);
        vec4 mv=modelViewMatrix*vec4(position,1.0);
        gl_PointSize=size*(400.0/-mv.z)*(0.7+0.3*vAlpha); gl_Position=projectionMatrix*mv; }`,
    fragmentShader: `varying float vAlpha; void main(){
      float d=length(gl_PointCoord-0.5)*2.0;
      float a=smoothstep(1.0,0.0,d)*vAlpha;
      gl_FragColor=vec4(1.0,0.97,0.90,a); }`,
    transparent: true, depthWrite: false, blending: THREE.AdditiveBlending,
  });
  scene.add(new THREE.Points(starGeo, starMaterial));

  // Moon
  const moon = new THREE.Mesh(new THREE.SphereGeometry(4,24,18),
    new THREE.MeshStandardMaterial({ color: 0xd0cca0, emissive: 0xeee8b0, emissiveIntensity: 2.0, roughness: 0.85 }));
  moon.position.set(-70,80,-80); scene.add(moon);
  const halo = new THREE.Mesh(new THREE.SphereGeometry(5.5,16,12),
    new THREE.MeshStandardMaterial({ color: 0xffeebb, emissive: 0xffeebb, emissiveIntensity: 1.0, transparent: true, opacity: 0.06, side: THREE.BackSide }));
  halo.position.copy(moon.position); scene.add(halo);
}

// ═══════════════════════════════════════════════════════════════
// AGENT 3D MODELS — GLB LOADER
// ═══════════════════════════════════════════════════════════════
const agentMeshes = {};
const animMixers = {};
const gltfLoader = new GLTFLoader();
let modelsLoaded = 0;
const TOTAL_MODELS = Object.keys(AGENTS_CFG).length;

function normalizeModel(root, targetHeight) {
  const box = new THREE.Box3().setFromObject(root);
  const size = box.getSize(new THREE.Vector3());
  if (size.y === 0) return;
  const scale = targetHeight / size.y;
  root.scale.setScalar(scale);
  // Re-compute after scaling
  const box2 = new THREE.Box3().setFromObject(root);
  const center = box2.getCenter(new THREE.Vector3());
  root.position.x -= center.x;
  root.position.z -= center.z;
  root.position.y -= box2.min.y;
}

function tintModel(root, color) {
  const c = new THREE.Color(color);
  root.traverse(child => {
    if (child.isMesh && child.material) {
      const mats = Array.isArray(child.material) ? child.material : [child.material];
      mats.forEach(mat => {
        if (mat.isMeshStandardMaterial || mat.isMeshPhongMaterial || mat.isMeshLambertMaterial) {
          mat.emissive = c.clone().multiplyScalar(0.12);
          mat.emissiveIntensity = 1.0;
        }
        child.castShadow = true;
        child.receiveShadow = true;
      });
    }
  });
}

function loadingStatus(msg) {
  const el = document.getElementById('loading-models');
  if (el) el.textContent = msg;
}

function buildAgentMesh(id, cfg) {
  const group = new THREE.Group();
  group.userData.id = id;
  group.userData.cfg = cfg;
  group.userData.status = 'idle';
  group.userData.floatOffset = Math.random() * Math.PI * 2;

  // Glow light
  const glow = new THREE.PointLight(cfg.colorInt, 0, 6);
  glow.position.y = 2;
  group.add(glow);
  group.userData.glowLight = glow;

  // Status aura
  const aura = createStatusAura(cfg.colorInt);
  group.add(aura);
  group.userData.aura = aura;

  const [px,,pz] = cfg.pos;
  group.position.set(px, 0, pz);
  scene.add(group);
  agentMeshes[id] = group;

  // Load GLB
  loadingStatus(`Loading ${cfg.emoji} ${cfg.name}…`);
  gltfLoader.load(
    cfg.model,
    (gltf) => {
      const model = gltf.scene;
      model.userData.isGLBModel = true;

      // Normalize size + color tint
      normalizeModel(model, cfg.targetH);
      tintModel(model, cfg.colorInt);

      // Special positioning
      if (id === 'cerbero') {
        // Wolf is a quadruped, keep low
        model.position.y = 0;
      }

      group.add(model);
      group.userData.glbModel = model;

      // Handle animations
      if (gltf.animations && gltf.animations.length > 0) {
        const mixer = new THREE.AnimationMixer(model);
        animMixers[id] = mixer;
        // Play first animation (usually idle/walk)
        const clip = gltf.animations[0];
        const action = mixer.clipAction(clip);
        action.play();
        group.userData.mixer = mixer;
        group.userData.currentAction = action;
        group.userData.allClips = gltf.animations;
      }

      modelsLoaded++;
      if (modelsLoaded >= TOTAL_MODELS) {
        loadingStatus('All gods summoned!');
        setTimeout(hideLoading, 400);
      }
    },
    (progress) => {
      const pct = Math.round((progress.loaded / (progress.total || 1)) * 100);
      loadingStatus(`Loading ${cfg.emoji} ${cfg.name}… ${pct}%`);
    },
    (error) => {
      console.warn(`Failed to load ${id} model, using fallback`, error);
      buildFallbackMesh(group, id, cfg);
      modelsLoaded++;
      if (modelsLoaded >= TOTAL_MODELS) hideLoading();
    }
  );
}

// Fallback: simple colored figure if GLB fails
function buildFallbackMesh(group, id, cfg) {
  const mat = new THREE.MeshStandardMaterial({ color: cfg.colorInt, emissive: cfg.colorInt, emissiveIntensity: 0.3, roughness: 0.5 });
  const body = new THREE.Mesh(new THREE.CylinderGeometry(0.4,0.5,2.5,8), mat);
  body.position.y = 1.25; body.castShadow = true; group.add(body);
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.45,8,6), mat);
  head.position.y = 2.9; head.castShadow = true; group.add(head);
  group.userData.glbModel = body;
}

// ═══════════════════════════════════════════════════════════════
// SPEECH BUBBLES
// ═══════════════════════════════════════════════════════════════
const bubbleSprites = {};

function makeBubbleCanvas(text, accentColor) {
  const W = 360, H = 120;
  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H+16;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = 'rgba(6,6,18,0.92)';
  roundRect(ctx,0,0,W,H,16); ctx.fill();
  ctx.shadowColor = accentColor; ctx.shadowBlur = 12;
  ctx.strokeStyle = accentColor+'cc'; ctx.lineWidth = 2;
  roundRect(ctx,1,1,W-2,H-2,15); ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.fillStyle = accentColor+'22';
  roundRect(ctx,1,1,W-2,28,{tl:15,tr:15,bl:0,br:0}); ctx.fill();
  ctx.font = 'bold 12px "Segoe UI", sans-serif';
  ctx.fillStyle = accentColor;
  ctx.fillText(text.slice(0,45),14,19);
  ctx.strokeStyle = accentColor+'44'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(14,30); ctx.lineTo(W-14,30); ctx.stroke();
  ctx.font = '11px "Segoe UI", sans-serif'; ctx.fillStyle = '#c8c0e8';
  const words = text.slice(45).split(' ');
  let line='', y=48;
  for (const w of words) {
    const test = line+w+' ';
    if (ctx.measureText(test).width > W-28 && line) {
      ctx.fillText(line.trim(),14,y); line=w+' '; y+=17; if(y>H-8) break;
    } else line=test;
  }
  if (line.trim()) ctx.fillText(line.trim(),14,y);
  ctx.fillStyle='rgba(6,6,18,0.92)';
  ctx.beginPath(); ctx.moveTo(W/2-10,H-1); ctx.lineTo(W/2+10,H-1); ctx.lineTo(W/2,H+14); ctx.fill();
  ctx.strokeStyle=accentColor+'cc'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(W/2-10,H); ctx.lineTo(W/2,H+14); ctx.lineTo(W/2+10,H); ctx.stroke();
  return canvas;
}

function roundRect(ctx,x,y,w,h,r) {
  if (typeof r==='number') r={tl:r,tr:r,bl:r,br:r};
  ctx.beginPath();
  ctx.moveTo(x+r.tl,y); ctx.lineTo(x+w-r.tr,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r.tr);
  ctx.lineTo(x+w,y+h-r.br); ctx.quadraticCurveTo(x+w,y+h,x+w-r.br,y+h);
  ctx.lineTo(x+r.bl,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r.bl);
  ctx.lineTo(x,y+r.tl); ctx.quadraticCurveTo(x,y,x+r.tl,y); ctx.closePath();
}

function showBubble(id, text, color) {
  clearBubble(id);
  if (!text) return;
  const cfg = AGENTS_CFG[id];
  const label = `${cfg.emoji} ${cfg.name}`;
  const canvas = makeBubbleCanvas(label+'    '+text, color);
  const tex = new THREE.CanvasTexture(canvas);
  const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false }));
  sprite.scale.set(4.2,1.3,1);
  sprite.userData.scaleTarget = new THREE.Vector3(4.2,1.3,1);
  sprite.scale.set(0.1,0.1,0.1);
  const m = agentMeshes[id];
  if (m) { sprite.position.copy(m.position); sprite.position.y += 5.5; }
  scene.add(sprite);
  bubbleSprites[id] = sprite;
}

function clearBubble(id) {
  if (bubbleSprites[id]) {
    scene.remove(bubbleSprites[id]);
    if (bubbleSprites[id].material.map) bubbleSprites[id].material.map.dispose();
    bubbleSprites[id].material.dispose();
    delete bubbleSprites[id];
  }
}

// ═══════════════════════════════════════════════════════════════
// MINIMAP
// ═══════════════════════════════════════════════════════════════
function updateMinimap() {
  const canvas = document.getElementById('minimap-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='rgba(5,5,18,0.6)';
  ctx.beginPath(); ctx.arc(W/2,H/2,W/2,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='rgba(212,175,55,0.2)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.arc(W/2,H/2,W*0.38,0,Math.PI*2); ctx.stroke();
  const scale = (W*0.42)/22;
  for (const [id,cfg] of Object.entries(AGENTS_CFG)) {
    const mx=W/2+cfg.pos[0]*scale, my=H/2+cfg.pos[2]*scale;
    const st=agentMeshes[id]?.userData.status||'idle';
    ctx.fillStyle=cfg.color; ctx.shadowColor=cfg.color; ctx.shadowBlur=st==='idle'?3:8;
    ctx.beginPath(); ctx.arc(mx,my,st==='idle'?3:5,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0; ctx.fillStyle='rgba(255,255,255,0.6)'; ctx.font='7px sans-serif';
    ctx.fillText(cfg.emoji,mx+5,my+3);
  }
  const camX=W/2+controls.target.x*scale, camY=H/2+controls.target.z*scale;
  ctx.fillStyle='rgba(255,255,255,0.4)'; ctx.shadowBlur=0;
  ctx.beginPath(); ctx.arc(camX,camY,2,0,Math.PI*2); ctx.fill();
}

// UI — AGENT CARDS

function buildAgentCards() {
  const list = document.getElementById('agent-list');
  const bar = document.getElementById('bottom-bar');
  for (const [id,cfg] of Object.entries(AGENTS_CFG)) {
    const card = document.createElement('div');
    card.className = 'agent-card'; card.id = `card-${id}`;
    card.innerHTML = `
      <div class="agent-card-header">
        <div class="agent-avatar" style="color:${cfg.color};border-color:${cfg.color}40;background:${cfg.color}15;">
          ${cfg.emoji}<div class="pulse-ring" style="color:${cfg.color}"></div>
        </div>
        <div class="agent-info">
          <div class="agent-name" style="color:${cfg.color}">${cfg.name}</div>
          <div class="agent-zone">${cfg.zone}</div>
        </div>
        <span class="status-badge idle" id="badge-${id}">idle</span>
      </div>
      <div class="agent-message-preview" id="msg-${id}">Standing by…</div>
      <div class="agent-time" id="time-${id}">—</div>`;
    card.addEventListener('click', () => focusAgent(id));
    list.appendChild(card);
    const bc = document.createElement('div');

    bc.addEventListener('click', () => focusAgent(id));

}

function updateAgentCard(id, state) {
  const card = document.getElementById(`card-${id}`);
  const bcard = document.getElementById(`bcard-${id}`);
  if (!card) return;
  card.className = `agent-card ${state.status}`;
  if (bcard) bcard.className = `bottom-card ${state.status}`;
  const badge = document.getElementById(`badge-${id}`);
  badge.className = `status-badge ${state.status}`;
  badge.textContent = state.status==='thinking' ? '⚡ thinking' : state.status==='responding' ? '💬 responding' : 'idle';
  const msgEl = document.getElementById(`msg-${id}`);
  const bmsgEl = document.getElementById(`bmsg-${id}`);
  let msgText = '';
  if (state.status==='thinking' && state.lastMessage) { msgEl.className='agent-message-preview'; msgText=`💭 "${state.lastMessage}"`; }
  else if (state.status==='responding' && state.lastResponse) { msgEl.className='agent-message-preview response'; msgText=state.lastResponse; }
  else { msgEl.className='agent-message-preview'; msgText=state.lastResponse||'Standing by…'; }
  msgEl.textContent=msgText;
  if (bmsgEl) bmsgEl.textContent=msgText;
  if (state.lastActive) document.getElementById(`time-${id}`).textContent=new Date(state.lastActive).toLocaleTimeString();
}

// ═══════════════════════════════════════════════════════════════
// 3D STATE UPDATES
// ═══════════════════════════════════════════════════════════════
function updateAgentMesh(id, state) {
  const m = agentMeshes[id];
  if (!m) return;
  const prevStatus = m.userData.status;
  m.userData.status = state.status;
  const cfg = AGENTS_CFG[id];
  if (agentSpots[id]) {
    agentSpots[id].intensity = state.status==='idle' ? 1.0 : state.status==='thinking' ? 5.0 : 7.0;
  }
  m.userData.glowLight.intensity = state.status==='idle' ? 0 : state.status==='thinking' ? 2.5 : 4.5;
  if (state.status !== 'idle') {
    const text = state.status==='thinking' ? state.lastMessage : state.lastResponse;
    if (text) showBubble(id, text, cfg.color);
  } else if (prevStatus !== 'idle') {
    setTimeout(() => clearBubble(id), 6000);
  }
}

// CAMERA FOCUS
// ═══════════════════════════════════════════════════════════════
const camAnim = { active: false, from: new THREE.Vector3(), to: new THREE.Vector3(), fromTarget: new THREE.Vector3(), toTarget: new THREE.Vector3(), t: 0 };

function focusAgent(id) {
  const cfg = AGENTS_CFG[id];
  focusTarget = id; autoOrbit = false;
  document.getElementById('focus-bar').textContent = `${cfg.emoji} ${cfg.name} — ${cfg.zone}`;
  document.getElementById('focus-bar').classList.add('visible');
  const dist = 8, angle = Math.atan2(cfg.pos[0], cfg.pos[2]);
  camAnim.active = true;
  camAnim.from.copy(camera.position);
  camAnim.to.set(cfg.pos[0]+Math.sin(angle)*dist, 4.5, cfg.pos[2]+Math.cos(angle)*dist);
  camAnim.fromTarget.copy(controls.target);
  camAnim.toTarget.set(cfg.pos[0], 1.5, cfg.pos[2]);
  camAnim.t = 0;
}

function releaseFocus() {
  focusTarget = null; autoOrbit = true;
  document.getElementById('focus-bar').classList.remove('visible');
}

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('click', (e) => {
  mouse.x = (e.clientX/window.innerWidth)*2-1;
  mouse.y = -(e.clientY/window.innerHeight)*2+1;
  raycaster.setFromCamera(mouse, camera);
  const objects = Object.values(agentMeshes).flatMap(g => { const a=[]; g.traverse(c=>{ if(c.isMesh) a.push(c); }); return a; });
  const hits = raycaster.intersectObjects(objects);
  if (hits.length > 0) {
    for (const [id,g] of Object.entries(agentMeshes)) {
      if (isDescendant(g, hits[0].object)) { focusAgent(id); return; }
    }
  }
  if (focusTarget) releaseFocus();
});

renderer.domElement.addEventListener('mousemove', (e) => {
  mouse.x = (e.clientX/window.innerWidth)*2-1;
  mouse.y = -(e.clientY/window.innerHeight)*2+1;
  raycaster.setFromCamera(mouse, camera);
  const objects = Object.values(agentMeshes).flatMap(g => { const a=[]; g.traverse(c=>{ if(c.isMesh) a.push(c); }); return a; });
  const hits = raycaster.intersectObjects(objects);
  const tip = document.getElementById('tooltip');
  if (hits.length > 0) {
    for (const [id,g] of Object.entries(agentMeshes)) {
      if (isDescendant(g, hits[0].object)) {
        const cfg=AGENTS_CFG[id], st=g.userData.status||'idle';
        tip.innerHTML=`<strong style="color:${cfg.color}">${cfg.emoji} ${cfg.name}</strong><br>${cfg.zone}<br><span style="opacity:0.6">${st}</span>`;
        tip.style.display='block'; tip.style.left=(e.clientX+12)+'px'; tip.style.top=(e.clientY-10)+'px';
        return;
      }
    }
  }
  tip.style.display='none';
});

function isDescendant(parent, child) {
  let c=child; while(c){ if(c===parent) return true; c=c.parent; } return false;
}

// WEBSOCKET
// ═══════════════════════════════════════════════════════════════
const wsStatus = document.getElementById('ws-status');
let ws;
function connectWS() {
  ws = new WebSocket(`ws://${window.location.host}`);
  ws.onopen = () => { wsStatus.className='connected'; wsStatus.textContent='🟢 Live'; };
  ws.onmessage = (event) => {
    try {
      const msg = JSON.parse(event.data);
      if (msg.type==='snapshot') {
        for (const [id,state] of Object.entries(msg.agents)) { updateAgentCard(id,state); updateAgentMesh(id,state); }
      } else if (msg.type==='agentUpdate') {
        updateAgentCard(msg.agentId,msg.state); updateAgentMesh(msg.agentId,msg.state);
      }
    } catch(e) { console.error('[WS] Parse error',e); }
  };
  ws.onclose = () => { wsStatus.className='disconnected'; wsStatus.textContent='🔴 Reconnecting…'; setTimeout(connectWS,3000); };
  ws.onerror = () => ws.close();
}

// ═══════════════════════════════════════════════════════════════
// ANIMATION LOOP
// ═══════════════════════════════════════════════════════════════
const clock = new THREE.Clock();
let minimapTimer = 0;

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.elapsedTime;

  // Auto-orbit
  if (autoOrbit) {
    cameraBaseAngle += ORBIT_SPEED * 0.016;
    const dist = camera.position.distanceTo(controls.target);
    camera.position.x = Math.sin(cameraBaseAngle) * dist * 0.9;
    camera.position.z = Math.cos(cameraBaseAngle) * dist * 0.9;
  }

  // Camera focus animation
  if (camAnim.active) {
    camAnim.t = Math.min(camAnim.t+0.03,1);
    const ease = 1-Math.pow(1-camAnim.t,3);
    camera.position.lerpVectors(camAnim.from,camAnim.to,ease);
    controls.target.lerpVectors(camAnim.fromTarget,camAnim.toTarget,ease);
    if (camAnim.t>=1) camAnim.active=false;
  }

  // Star twinkle
  if (starMaterial) starMaterial.uniforms.time.value = t;

  // Water
  if (waterMesh) waterMesh.material.uniforms.time.value = t;

  // Torch flicker
  for (const tl of torchLights) {
    tl.userData.flicker = (tl.userData.flicker||0)+0.15;
    const f=tl.userData.flicker;
    tl.intensity = 4.5+Math.sin(f*7.1)*1.8+Math.sin(f*13.3)*0.9+Math.sin(f*31.7)*0.4;
  }

  // Flame meshes (bloom-enhanced)
  for (const flame of torchMeshes) {
    const p = flame.userData.phase+t;
    if (flame.userData.isFlameCore) {
      flame.material.emissiveIntensity = 7+Math.sin(p*11)*2;
    } else {
      flame.position.y = flame.userData.baseY + Math.sin(p*8)*0.04;
      flame.scale.x = 0.85+Math.sin(p*11)*0.18;
      flame.scale.z = 0.85+Math.cos(p*9)*0.18;
      flame.scale.y = 0.9+Math.sin(p*6)*0.15;
      flame.material.emissiveIntensity = 5+Math.sin(p*9)*1.5;
    }
  }

  // Saga orb
  if (scene.userData.sagaOrb) {
    scene.userData.sagaOrb.material.emissiveIntensity = 3+Math.sin(t*2.5)*1;
    scene.userData.sagaOrb.position.y = 2.2+Math.sin(t*1.8)*0.15;
    scene.userData.sagaOrb.rotation.y = t*0.8;
  }

  // Update GLB animation mixers
  for (const [id, mixer] of Object.entries(animMixers)) {
    const status = agentMeshes[id]?.userData.status || 'idle';
    // Adjust playback speed based on status
    const speedMult = status==='thinking' ? 1.8 : status==='responding' ? 1.3 : 0.8;
    mixer.timeScale = speedMult;
    mixer.update(dt);
  }

  // Agent animations
  for (const [id, m] of Object.entries(agentMeshes)) {
    const off = m.userData.floatOffset;
    const status = m.userData.status||'idle';
    const cfg = AGENTS_CFG[id];

    // Float bob (at world level since GLB models sit on y=0)
    const baseY = 0;
    if (status==='idle') {
      m.position.y = baseY + Math.sin(t*0.7+off)*0.12;
      if (!focusTarget || focusTarget!==id) m.rotation.y = Math.sin(t*0.25+off)*0.10;
    } else if (status==='thinking') {
      m.position.y = baseY + Math.sin(t*3.0+off)*0.06;
      m.rotation.y += 0.025;
    } else if (status==='responding') {
      m.position.y = baseY + 0.18 + Math.sin(t*5.0+off)*0.04;
      m.rotation.y += 0.018;
    }

    // Status aura update
    const aura = m.userData.aura;
    if (aura) {
      const ring = aura.userData.ring;
      const outerRing = aura.userData.outerRing;
      const column = aura.userData.column;
      const glowCircle = aura.userData.glowCircle;

      if (status==='idle') {
        ring.material.opacity = Math.max(0, ring.material.opacity - 0.05);
        outerRing.material.opacity = Math.max(0, outerRing.material.opacity - 0.05);
        column.material.opacity = Math.max(0, column.material.opacity - 0.08);
        glowCircle.material.opacity = Math.max(0, glowCircle.material.opacity - 0.05);
      } else if (status==='thinking') {
        const pulse = 0.5+Math.sin(t*4)*0.3;
        ring.material.opacity = Math.min(0.8, ring.material.opacity+0.06);
        ring.material.emissiveIntensity = 3+pulse*3;
        outerRing.material.opacity = Math.min(0.5, outerRing.material.opacity+0.04);
        outerRing.scale.set(1+Math.sin(t*3)*0.1, 1, 1+Math.sin(t*3)*0.1);
        column.material.opacity = Math.min(0.3, column.material.opacity+0.04);
        column.material.emissiveIntensity = 2+pulse*2;
        glowCircle.material.opacity = Math.min(0.4, glowCircle.material.opacity+0.04);
        aura.rotation.y = t*1.5;
      } else if (status==='responding') {
        ring.material.opacity = Math.min(0.9, ring.material.opacity+0.08);
        ring.material.emissiveIntensity = 5+Math.sin(t*7)*2;
        outerRing.material.opacity = Math.min(0.6, outerRing.material.opacity+0.05);
        column.material.opacity = Math.max(0, column.material.opacity-0.05);
        glowCircle.material.opacity = Math.min(0.5, glowCircle.material.opacity+0.06);
        aura.rotation.y = t*2.5;
      }
    }

    // Bubble update
    if (bubbleSprites[id]) {
      const bubble = bubbleSprites[id];
      bubble.position.x = m.position.x;
      bubble.position.y = m.position.y + 5.5;
      bubble.position.z = m.position.z;
      const target = bubble.userData.scaleTarget;
      if (target) bubble.scale.lerp(target, 0.12);
    }
  }

  // Dust particles
  if (dustParticles && dustPos) {
    const pos = dustParticles.geometry.attributes.position;
    const n = pos.count;
    for (let i=0;i<n;i++) {
      pos.array[i*3+1] += 0.005+Math.sin(t*0.3+i*0.1)*0.002;
      pos.array[i*3]   += Math.sin(t*0.5+i*0.2)*0.002;
      pos.array[i*3+2] += Math.cos(t*0.4+i*0.3)*0.002;
      if (pos.array[i*3+1] > 9) {
        pos.array[i*3+1]=0; const a=Math.random()*Math.PI*2, r=Math.random()*20;
        pos.array[i*3]=Math.cos(a)*r; pos.array[i*3+2]=Math.sin(a)*r;
      }
    }
    pos.needsUpdate=true; dustParticles.rotation.y=t*0.02;
  }

  // Forge sparks
  if (forgeSparks && forgeSparkPos) {
    const pos = forgeSparks.geometry.attributes.position;
    const [fx,,fz] = AGENTS_CFG.vulkan.pos;
    const vulkanStatus = agentMeshes.vulkan?.userData.status||'idle';
    const emitRate = vulkanStatus==='thinking' ? 1.0 : 0.3;
    const n=pos.count;
    for (let i=0;i<n;i++) {
      pos.array[i*3]   += forgeSparkVel[i*3];
      pos.array[i*3+1] += forgeSparkVel[i*3+1];
      pos.array[i*3+2] += forgeSparkVel[i*3+2];
      forgeSparkVel[i*3+1] -= 0.003;
      if (pos.array[i*3+1]>4 || pos.array[i*3+1]<0.3) {
        if (Math.random()<emitRate) {
          pos.array[i*3]=fx-1.5+(Math.random()-0.5)*0.8; pos.array[i*3+1]=0.9;
          pos.array[i*3+2]=fz+0.5+(Math.random()-0.5)*0.8;
          forgeSparkVel[i*3]=(Math.random()-0.5)*0.1; forgeSparkVel[i*3+1]=0.06+Math.random()*0.14;
          forgeSparkVel[i*3+2]=(Math.random()-0.5)*0.1;
        }
      }
    }
    pos.needsUpdate=true;
    forgeSparks.material.color.setHSL(0.08+Math.sin(t*5)*0.04,1,0.6);
  }

  // Rune particles
  if (runeParticles && runePos) {
    const pos = runeParticles.geometry.attributes.position;
    const [sx,,sz] = AGENTS_CFG.saga.pos;
    const n=pos.count;
    for (let i=0;i<n;i++) {
      const a=t*0.3+i*0.4, r=1.5+Math.sin(t*0.5+i)*0.8;
      pos.array[i*3]=sx+Math.cos(a+i*0.8)*r; pos.array[i*3+1]+=0.012;
      pos.array[i*3+2]=sz+Math.sin(a+i*0.8)*r;
      if (pos.array[i*3+1]>5) pos.array[i*3+1]=0.1;
    }
    pos.needsUpdate=true;
    runeParticles.material.color.setHSL(0.77+Math.sin(t)*0.05,1,0.6);
  }

  // Minimap
  minimapTimer += 0.016;
  if (minimapTimer > 0.25) { minimapTimer=0; updateMinimap(); }

  controls.update();
  composer.render();
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
function init() {
  buildSky();
  buildGround();
  buildColumns();
  buildAltar();
  buildWaterPool();

  const [vx,,vz] = AGENTS_CFG.vulkan.pos;
  const [sx,,sz] = AGENTS_CFG.saga.pos;
  const [cx,,cz] = AGENTS_CFG.cerbero.pos;
  buildForge(vx, vz);
  buildLibrary(sx, sz);
  buildGate(cx, cz);

  buildParticles();
  buildAgentCards();

  cameraBaseAngle = Math.atan2(camera.position.x, camera.position.z);

  // Load GLB agent models
  for (const [id,cfg] of Object.entries(AGENTS_CFG)) {
    buildAgentMesh(id, cfg);
  }

  animate();
  connectWS();

  // Safety timeout for loading screen
  setTimeout(() => {
    if (modelsLoaded < TOTAL_MODELS) {
      console.warn('Model loading timeout — showing scene anyway');
      hideLoading();
    }
  }, 12000);
}

init();
</script>
</body>
</html>
