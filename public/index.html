<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🏛️ Pantheon Village — OpenClaw Agents</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a1a;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
      color: #e8e0d0;
    }

    #canvas-container {
      position: fixed;
      inset: 0;
    }

    canvas { display: block; }

    /* ── Header ── */
    #header {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 12px 24px;
      background: linear-gradient(180deg, rgba(5,5,20,0.95) 0%, transparent 100%);
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 100;
      pointer-events: none;
    }

    #header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #d4af37;
      text-shadow: 0 0 20px rgba(212,175,55,0.5);
    }

    #header .subtitle {
      font-size: 0.7rem;
      color: #8080a0;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    #ws-status {
      font-size: 0.7rem;
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid;
      pointer-events: none;
    }
    #ws-status.connected { color: #4ade80; border-color: #4ade8040; background: #4ade8010; }
    #ws-status.disconnected { color: #f87171; border-color: #f8717140; background: #f8717110; }

    /* ── Agent Cards ── */
    #agent-panel {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 16px 24px;
      background: linear-gradient(0deg, rgba(5,5,20,0.97) 0%, transparent 100%);
      display: flex;
      gap: 12px;
      justify-content: center;
      z-index: 100;
      flex-wrap: wrap;
    }

    .agent-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 10px 14px;
      min-width: 200px;
      max-width: 260px;
      transition: border-color 0.3s, box-shadow 0.3s;
      position: relative;
      overflow: hidden;
    }

    .agent-card.thinking {
      border-color: rgba(255,200,50,0.4);
      box-shadow: 0 0 20px rgba(255,200,50,0.15);
      animation: pulse-thinking 1s ease-in-out infinite;
    }

    .agent-card.responding {
      border-color: rgba(100,255,150,0.4);
      box-shadow: 0 0 20px rgba(100,255,150,0.15);
    }

    @keyframes pulse-thinking {
      0%, 100% { box-shadow: 0 0 10px rgba(255,200,50,0.1); }
      50% { box-shadow: 0 0 30px rgba(255,200,50,0.3); }
    }

    .agent-card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .agent-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      transition: all 0.3s;
    }

    .agent-card.thinking .agent-dot { animation: blink 0.5s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    .agent-name {
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    .agent-status-badge {
      margin-left: auto;
      font-size: 0.6rem;
      padding: 2px 7px;
      border-radius: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .agent-status-badge.idle       { background: rgba(255,255,255,0.06); color: #8080a0; }
    .agent-status-badge.thinking   { background: rgba(255,200,50,0.15);  color: #ffd700; }
    .agent-status-badge.responding { background: rgba(100,255,150,0.15); color: #4ade80; }

    .agent-message {
      font-size: 0.7rem;
      color: #9090b0;
      line-height: 1.4;
      min-height: 1.4em;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .agent-message.response { color: #c0d0c0; }

    .agent-meta {
      margin-top: 6px;
      font-size: 0.6rem;
      color: #50506a;
      display: flex;
      justify-content: space-between;
    }

    /* ── Tooltip (3D label) ── */
    #tooltip {
      position: fixed;
      pointer-events: none;
      z-index: 200;
      background: rgba(10,10,26,0.9);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 0.75rem;
      max-width: 200px;
      display: none;
    }

    /* ── Loading ── */
    #loading {
      position: fixed;
      inset: 0;
      background: #0a0a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 999;
      gap: 16px;
      transition: opacity 0.5s;
    }

    #loading h2 { color: #d4af37; font-size: 1.5rem; letter-spacing: 0.2em; }
    #loading p  { color: #8080a0; font-size: 0.8rem; }

    .spinner {
      width: 48px; height: 48px;
      border: 3px solid rgba(212,175,55,0.2);
      border-top-color: #d4af37;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <h2>🏛️ PANTHEON</h2>
  <p>Summoning the gods...</p>
</div>

<div id="canvas-container"></div>

<div id="header">
  <div>
    <h1>🏛️ Pantheon Village</h1>
    <div class="subtitle">OpenClaw Agent Council</div>
  </div>
  <div id="ws-status" class="disconnected">⚫ Connecting…</div>
</div>

<div id="agent-panel">
  <!-- Cards injected by JS -->
</div>

<div id="tooltip"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ═══════════════════════════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════════════════════════
const AGENTS_CFG = {
  main:    { name: 'Atlas',   emoji: '🌍', color: '#4A90D9', pos: [0, 0, 0],       zone: 'Center — The Throne' },
  vulkan:  { name: 'Vulkan',  emoji: '🔥', color: '#FF6B35', pos: [-8, 0, -6],     zone: 'West — The Forge' },
  saga:    { name: 'Saga',    emoji: '📜', color: '#9B59B6', pos: [8, 0, -6],      zone: 'East — The Library' },
  cerbero: { name: 'Cerbero', emoji: '🐕‍🦺', color: '#7F8C8D', pos: [0, 0, 9],   zone: 'South — The Gate' },
};

// ═══════════════════════════════════════════════════════════════════════════════
// THREE.JS SCENE SETUP
// ═══════════════════════════════════════════════════════════════════════════════
const container = document.getElementById('canvas-container');
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0a0a2a, 0.018);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 18, 28);
camera.lookAt(0, 0, 0);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 8;
controls.maxDistance = 60;
controls.maxPolarAngle = Math.PI / 2.1;
controls.target.set(0, 2, 0);

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ═══════════════════════════════════════════════════════════════════════════════
// LIGHTS
// ═══════════════════════════════════════════════════════════════════════════════
const ambientLight = new THREE.AmbientLight(0x1a1a3a, 3);
scene.add(ambientLight);

// Sun
const sunLight = new THREE.DirectionalLight(0xffeedd, 3);
sunLight.position.set(20, 30, 10);
sunLight.castShadow = true;
sunLight.shadow.mapSize.set(2048, 2048);
sunLight.shadow.camera.near = 1;
sunLight.shadow.camera.far = 100;
sunLight.shadow.camera.left = -30;
sunLight.shadow.camera.right = 30;
sunLight.shadow.camera.top = 30;
sunLight.shadow.camera.bottom = -30;
scene.add(sunLight);

// Rim light (blue)
const rimLight = new THREE.DirectionalLight(0x4466aa, 1.5);
rimLight.position.set(-15, 10, -20);
scene.add(rimLight);

// ═══════════════════════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════════════════════
function hexToColor(hex) {
  return new THREE.Color(hex);
}

function makeMaterial(hex, emissiveHex, roughness = 0.4, metalness = 0.3) {
  return new THREE.MeshStandardMaterial({
    color: hexToColor(hex),
    emissive: hexToColor(emissiveHex || hex),
    emissiveIntensity: 0.15,
    roughness,
    metalness,
  });
}

// ═══════════════════════════════════════════════════════════════════════════════
// GROUND — Marble floor
// ═══════════════════════════════════════════════════════════════════════════════
function buildGround() {
  // Main marble platform
  const geo = new THREE.CylinderGeometry(22, 22, 0.5, 64);
  const mat = new THREE.MeshStandardMaterial({
    color: 0xd8cfc0,
    roughness: 0.2,
    metalness: 0.05,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.y = -0.25;
  mesh.receiveShadow = true;
  scene.add(mesh);

  // Steps (3 concentric rings, decreasing height)
  for (let i = 1; i <= 3; i++) {
    const r = 22 + i * 1.5;
    const h = 0.3 - i * 0.08;
    const step = new THREE.Mesh(
      new THREE.CylinderGeometry(r, r, h, 64),
      new THREE.MeshStandardMaterial({ color: 0xc8c0b0, roughness: 0.3 })
    );
    step.position.y = -0.25 - (i * 0.12);
    step.receiveShadow = true;
    scene.add(step);
  }

  // Ground plane
  const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(200, 200),
    new THREE.MeshStandardMaterial({ color: 0x151525, roughness: 1 })
  );
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = -0.55;
  ground.receiveShadow = true;
  scene.add(ground);
}

// ═══════════════════════════════════════════════════════════════════════════════
// COLUMNS
// ═══════════════════════════════════════════════════════════════════════════════
function buildColumns() {
  const colMat = new THREE.MeshStandardMaterial({
    color: 0xe8e0d4,
    roughness: 0.3,
    metalness: 0.05,
  });
  const capMat = new THREE.MeshStandardMaterial({
    color: 0xd4c8bc,
    roughness: 0.25,
  });

  const colCount = 16;
  const radius = 17;

  for (let i = 0; i < colCount; i++) {
    const angle = (i / colCount) * Math.PI * 2;
    const x = Math.cos(angle) * radius;
    const z = Math.sin(angle) * radius;

    // Shaft
    const shaft = new THREE.Mesh(
      new THREE.CylinderGeometry(0.45, 0.55, 8, 12),
      colMat
    );
    shaft.position.set(x, 4, z);
    shaft.castShadow = true;
    shaft.receiveShadow = true;
    scene.add(shaft);

    // Capital (top)
    const cap = new THREE.Mesh(
      new THREE.BoxGeometry(1.2, 0.4, 1.2),
      capMat
    );
    cap.position.set(x, 8.2, z);
    scene.add(cap);

    // Base
    const base = new THREE.Mesh(
      new THREE.CylinderGeometry(0.65, 0.65, 0.3, 12),
      capMat
    );
    base.position.set(x, 0.15, z);
    scene.add(base);
  }

  // Entablature (beam ring on top)
  const beamGeo = new THREE.TorusGeometry(17, 0.5, 6, 64);
  const beam = new THREE.Mesh(beamGeo, colMat);
  beam.position.y = 8.5;
  beam.rotation.x = Math.PI / 2;
  scene.add(beam);
}

// ═══════════════════════════════════════════════════════════════════════════════
// CENTRAL ALTAR (for Atlas)
// ═══════════════════════════════════════════════════════════════════════════════
function buildAltar() {
  const mat = new THREE.MeshStandardMaterial({ color: 0xc8b890, roughness: 0.3, metalness: 0.2 });

  const base = new THREE.Mesh(new THREE.CylinderGeometry(2.5, 2.5, 0.3, 24), mat);
  base.position.y = 0.15;
  scene.add(base);

  const pillar = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 1.0, 1.2, 24), mat);
  pillar.position.y = 0.9;
  scene.add(pillar);

  const top = new THREE.Mesh(new THREE.CylinderGeometry(1.5, 1.0, 0.25, 24), mat);
  top.position.y = 1.6;
  scene.add(top);
}

// ═══════════════════════════════════════════════════════════════════════════════
// ZONE DECORATIONS
// ═══════════════════════════════════════════════════════════════════════════════
function buildZones() {
  // Vulkan forge (west) — anvil + fire pit
  buildForge(-8, -6);
  // Saga library (east) — bookshelf / scroll rack
  buildLibrary(8, -6);
  // Cerbero gate (south) — arch gateway
  buildGate(0, 9);
}

function buildForge(x, z) {
  const mat = new THREE.MeshStandardMaterial({ color: 0x3a2a1a, roughness: 0.8, metalness: 0.4 });
  // Anvil
  const anvil = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.5, 0.8), mat);
  anvil.position.set(x - 0.5, 0.6, z);
  anvil.castShadow = true;
  scene.add(anvil);
  // Forge pit
  const pit = new THREE.Mesh(
    new THREE.CylinderGeometry(0.8, 0.8, 0.3, 16),
    new THREE.MeshStandardMaterial({ color: 0x1a0a00, roughness: 1, emissive: 0xff3300, emissiveIntensity: 0.3 })
  );
  pit.position.set(x + 1.2, 0.15, z);
  scene.add(pit);

  // Fire point light
  const fireLight = new THREE.PointLight(0xff5500, 3, 8);
  fireLight.position.set(x + 1.2, 1.2, z);
  scene.add(fireLight);
  // Animate fire light
  fireLight.userData.flicker = Math.random() * Math.PI * 2;
  scene.userData.flickerLights = scene.userData.flickerLights || [];
  scene.userData.flickerLights.push(fireLight);
}

function buildLibrary(x, z) {
  const wood = new THREE.MeshStandardMaterial({ color: 0x5a3820, roughness: 0.8 });
  // Bookshelf
  const shelf = new THREE.Mesh(new THREE.BoxGeometry(2, 2.5, 0.5), wood);
  shelf.position.set(x, 1.25, z - 1);
  shelf.castShadow = true;
  scene.add(shelf);
  // Scrolls
  for (let i = 0; i < 4; i++) {
    const scroll = new THREE.Mesh(
      new THREE.CylinderGeometry(0.08, 0.08, 0.5, 8),
      new THREE.MeshStandardMaterial({ color: 0xf0e8c0, roughness: 0.9 })
    );
    scroll.rotation.z = Math.PI / 2;
    scroll.position.set(x - 0.7 + i * 0.45, 1.5, z - 0.6);
    scene.add(scroll);
  }
  // Purple ambient
  const libLight = new THREE.PointLight(0x8844cc, 1.5, 6);
  libLight.position.set(x, 2, z);
  scene.add(libLight);
}

function buildGate(x, z) {
  const stone = new THREE.MeshStandardMaterial({ color: 0x606070, roughness: 0.7, metalness: 0.1 });
  // Two pillars
  [-1.5, 1.5].forEach(dx => {
    const pillar = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.5, 4, 10), stone);
    pillar.position.set(x + dx, 2, z);
    pillar.castShadow = true;
    scene.add(pillar);
  });
  // Lintel
  const lintel = new THREE.Mesh(new THREE.BoxGeometry(4.5, 0.5, 0.7), stone);
  lintel.position.set(x, 4.25, z);
  scene.add(lintel);
  // Guard light
  const gateLight = new THREE.PointLight(0xaa3333, 1.5, 6);
  gateLight.position.set(x, 3, z);
  scene.add(gateLight);
}

// ═══════════════════════════════════════════════════════════════════════════════
// SKYBOX — Stars
// ═══════════════════════════════════════════════════════════════════════════════
function buildSky() {
  // Gradient sky dome
  const skyGeo = new THREE.SphereGeometry(120, 32, 16);
  const skyMat = new THREE.ShaderMaterial({
    side: THREE.BackSide,
    vertexShader: `
      varying vec3 vWorldPos;
      void main() {
        vWorldPos = position;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      varying vec3 vWorldPos;
      void main() {
        float t = clamp((vWorldPos.y + 60.0) / 120.0, 0.0, 1.0);
        vec3 bottom = vec3(0.04, 0.04, 0.12);
        vec3 top    = vec3(0.08, 0.10, 0.25);
        gl_FragColor = vec4(mix(bottom, top, t), 1.0);
      }
    `,
  });
  scene.add(new THREE.Mesh(skyGeo, skyMat));

  // Stars
  const starCount = 2000;
  const positions = new Float32Array(starCount * 3);
  for (let i = 0; i < starCount; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi   = Math.acos(2 * Math.random() - 1);
    const r = 100 + Math.random() * 15;
    positions[i * 3]     = r * Math.sin(phi) * Math.cos(theta);
    positions[i * 3 + 1] = Math.abs(r * Math.cos(phi));
    positions[i * 3 + 2] = r * Math.sin(phi) * Math.sin(theta);
  }
  const starGeo = new THREE.BufferGeometry();
  starGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.35, sizeAttenuation: true });
  scene.add(new THREE.Points(starGeo, starMat));
}

// ═══════════════════════════════════════════════════════════════════════════════
// AGENT MESHES
// ═══════════════════════════════════════════════════════════════════════════════
const agentMeshes = {};

function buildAgentMesh(id, cfg) {
  const group = new THREE.Group();
  const color = cfg.color;
  const colorHex = parseInt(color.replace('#', ''), 16);

  const bodyMat = new THREE.MeshStandardMaterial({
    color: colorHex,
    emissive: colorHex,
    emissiveIntensity: 0.2,
    roughness: 0.35,
    metalness: 0.4,
  });

  if (id === 'main') {
    // Atlas: robed figure with world sphere
    buildAtlas(group, bodyMat, colorHex);
  } else if (id === 'vulkan') {
    buildVulkan(group, bodyMat, colorHex);
  } else if (id === 'saga') {
    buildSaga(group, bodyMat, colorHex);
  } else if (id === 'cerbero') {
    buildCerbero(group, bodyMat, colorHex);
  }

  // Glow point light per agent
  const light = new THREE.PointLight(colorHex, 0, 5);
  light.position.y = 2;
  group.add(light);
  group.userData.light = light;

  const [px, , pz] = cfg.pos;
  group.position.set(px, 1.7, pz);
  group.userData.id = id;
  group.userData.cfg = cfg;
  group.userData.status = 'idle';
  group.userData.floatOffset = Math.random() * Math.PI * 2;

  scene.add(group);
  agentMeshes[id] = group;
  return group;
}

function buildAtlas(group, mat, colorHex) {
  // Body — tall hexagonal prism (robed)
  const body = new THREE.Mesh(
    new THREE.CylinderGeometry(0.45, 0.6, 2.0, 6),
    mat
  );
  body.position.y = 0;
  group.add(body);

  // Head — icosahedron
  const head = new THREE.Mesh(
    new THREE.IcosahedronGeometry(0.42, 1),
    new THREE.MeshStandardMaterial({
      color: 0xf0d090,
      emissive: 0xd4af37,
      emissiveIntensity: 0.3,
      roughness: 0.3,
      metalness: 0.4,
    })
  );
  head.position.y = 1.3;
  group.add(head);

  // Crown — small torus
  const crown = new THREE.Mesh(
    new THREE.TorusGeometry(0.3, 0.06, 8, 20),
    new THREE.MeshStandardMaterial({ color: 0xd4af37, emissive: 0xd4af37, emissiveIntensity: 0.5, metalness: 0.8, roughness: 0.1 })
  );
  crown.position.y = 1.6;
  crown.rotation.x = Math.PI / 2;
  group.add(crown);

  // World sphere (held up)
  const worldGroup = new THREE.Group();
  worldGroup.position.set(0.8, 0.6, 0);

  const worldSphere = new THREE.Mesh(
    new THREE.SphereGeometry(0.38, 16, 12),
    new THREE.MeshStandardMaterial({
      color: 0x2277cc,
      emissive: 0x1144aa,
      emissiveIntensity: 0.4,
      roughness: 0.3,
      metalness: 0.2,
    })
  );
  worldGroup.add(worldSphere);

  // Latitude/longitude lines
  for (let i = 0; i < 3; i++) {
    const ring = new THREE.Mesh(
      new THREE.TorusGeometry(0.38, 0.015, 6, 24),
      new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x88ccff, emissiveIntensity: 0.5 })
    );
    ring.rotation.y = (i / 3) * Math.PI;
    worldGroup.add(ring);
  }
  worldGroup.userData.isWorld = true;
  group.add(worldGroup);
  group.userData.worldGroup = worldGroup;
}

function buildVulkan(group, mat, colorHex) {
  // Stocky muscular body — wider box
  const body = new THREE.Mesh(
    new THREE.BoxGeometry(0.9, 1.8, 0.7),
    mat
  );
  body.position.y = 0;
  group.add(body);

  // Helmet — flattened octahedron
  const helmet = new THREE.Mesh(
    new THREE.OctahedronGeometry(0.45),
    new THREE.MeshStandardMaterial({ color: 0x8a4020, emissive: 0xff4400, emissiveIntensity: 0.3, metalness: 0.7, roughness: 0.2 })
  );
  helmet.scale.y = 0.7;
  helmet.position.y = 1.4;
  group.add(helmet);

  // Hammer (wielded)
  const hammerGroup = new THREE.Group();

function buildSaga(group, mat, colorHex) {

  // Head

  const hood = new THREE.Mesh(

  scrollGroup.rotation.z = -0.3;

    new THREE.CylinderGeometry(0.1, 0.1, 0.8, 10),

  [0.4, -0.4].forEach(dy => {

    rune.position.set(Math.cos(angle) * 0.7, 0.5 + Math.random() * 0.5, Math.sin(angle) * 0.7);
    rune.userData.runeAngle = angle;
    rune.userData.runeIndex = i;
    group.userData.runes = group.userData.runes || [];
    group.userData.runes.push(rune);
    group.add(rune);

function buildCerbero(group, mat, colorHex) {

// ═══════════════════════════════════════════════════════════════════════════════
// SPEECH BUBBLES (3D sprite labels)
// ═══════════════════════════════════════════════════════════════════════════════
const bubbleSprites = {};

function makeBubbleTexture(text, bgColor, maxW = 300) {
  const canvas = document.createElement('canvas');
  const W = 320, H = 100;
  canvas.width = W;
  canvas.height = H;
  const ctx = canvas.getContext('2d');

  // Background
  ctx.fillStyle = 'rgba(10,10,30,0.88)';
  roundRect(ctx, 0, 0, W, H, 14);
  ctx.fill();

  // Border
  ctx.strokeStyle = bgColor + 'cc';
  ctx.lineWidth = 2.5;
  roundRect(ctx, 1, 1, W - 2, H - 2, 13);
  ctx.stroke();

  // Text
  ctx.fillStyle = '#e8e0d0';
  ctx.font = 'bold 13px sans-serif';
  ctx.fillText(text.slice(0, 32), 12, 24);

  ctx.font = '11px sans-serif';
  ctx.fillStyle = '#b0b0c8';
  const words = text.slice(0, 80).split(' ');
  let line = '', y = 46;
  for (const w of words) {
    const test = line + w + ' ';
    if (ctx.measureText(test).width > W - 24) {
      ctx.fillText(line, 12, y);
      line = w + ' ';
      y += 16;
      if (y > H - 10) break;
    } else {
      line = test;
    }
  }
  if (y <= H - 10) ctx.fillText(line, 12, y);

  // Triangle pointer
  ctx.fillStyle = 'rgba(10,10,30,0.88)';
  ctx.beginPath();
  ctx.moveTo(W / 2 - 8, H - 1);
  ctx.lineTo(W / 2 + 8, H - 1);
  ctx.lineTo(W / 2, H + 10);
  ctx.fill();

  return canvas;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function updateBubble(id, text, bgColor) {
  if (bubbleSprites[id]) {
    scene.remove(bubbleSprites[id]);
    bubbleSprites[id].material.map.dispose();
    bubbleSprites[id].material.dispose();
  }
  if (!text) return;

  const canvas = makeBubbleTexture(text, bgColor);
  const texture = new THREE.CanvasTexture(canvas);
  const mat = new THREE.SpriteMaterial({ map: texture, transparent: true, depthTest: false });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(3.5, 1.1, 1);

  const mesh = agentMeshes[id];
  if (mesh) {
    sprite.position.copy(mesh.position);
    sprite.position.y += 4.2;
  }
  scene.add(sprite);
  bubbleSprites[id] = sprite;
}

// ═══════════════════════════════════════════════════════════════════════════════
// PARTICLE SYSTEMS
// ═══════════════════════════════════════════════════════════════════════════════
let fireParticles, firePositions;

function buildFireParticles(x, z) {
  const count = 80;
  const geo = new THREE.BufferGeometry();
  firePositions = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    firePositions[i * 3]     = x + 1.2 + (Math.random() - 0.5) * 0.6;
    firePositions[i * 3 + 1] = Math.random() * 1.5;
    firePositions[i * 3 + 2] = z + (Math.random() - 0.5) * 0.6;
  }
  geo.setAttribute('position', new THREE.BufferAttribute(firePositions, 3));
  const mat = new THREE.PointsMaterial({ color: 0xff7700, size: 0.15, sizeAttenuation: true, transparent: true, opacity: 0.8 });
  fireParticles = new THREE.Points(geo, mat);
  scene.add(fireParticles);
}

// Rune particles for Saga
let sagaRuneParticles;
function buildSagaRunes(x, z) {
  const count = 40;
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    pos[i * 3]     = x + (Math.random() - 0.5) * 3;
    pos[i * 3 + 1] = Math.random() * 2.5;
    pos[i * 3 + 2] = z + (Math.random() - 0.5) * 3;
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const mat = new THREE.PointsMaterial({ color: 0xaa55ff, size: 0.12, sizeAttenuation: true, transparent: true, opacity: 0.6 });
  sagaRuneParticles = new THREE.Points(geo, mat);
  scene.add(sagaRuneParticles);
}

// ═══════════════════════════════════════════════════════════════════════════════
// UI — Agent Cards
// ═══════════════════════════════════════════════════════════════════════════════
function buildAgentCards() {
  const panel = document.getElementById('agent-panel');
  for (const [id, cfg] of Object.entries(AGENTS_CFG)) {
    const card = document.createElement('div');
    card.className = 'agent-card';
    card.id = `card-${id}`;
    card.innerHTML = `
      <div class="agent-card-header">
        <div class="agent-dot" id="dot-${id}" style="background:${cfg.color}"></div>
        <span class="agent-name" style="color:${cfg.color}">${cfg.emoji} ${cfg.name}</span>
        <span class="agent-status-badge idle" id="badge-${id}">idle</span>
      </div>
      <div class="agent-message" id="msg-${id}">Waiting for messages…</div>
      <div class="agent-meta">
        <span id="zone-${id}">${cfg.zone}</span>
        <span id="time-${id}">—</span>
      </div>
    `;
    panel.appendChild(card);
  }
}

function updateAgentCard(id, state) {
  const card = document.getElementById(`card-${id}`);
  if (!card) return;

  card.className = `agent-card ${state.status}`;

  const badge = document.getElementById(`badge-${id}`);
  badge.className = `agent-status-badge ${state.status}`;
  badge.textContent = state.status === 'thinking' ? '⚡ thinking' :
                      state.status === 'responding' ? '💬 responding' : 'idle';

  const msgEl = document.getElementById(`msg-${id}`);
  if (state.status === 'thinking' && state.lastMessage) {
    msgEl.className = 'agent-message';
    msgEl.textContent = `"${state.lastMessage}"`;
  } else if (state.status === 'responding' && state.lastResponse) {
    msgEl.className = 'agent-message response';
    msgEl.textContent = state.lastResponse;
  } else if (state.status === 'idle') {
    msgEl.className = 'agent-message';
    msgEl.textContent = state.lastResponse ? state.lastResponse : 'Standing by…';
  }

  if (state.lastActive) {
    const d = new Date(state.lastActive);
    document.getElementById(`time-${id}`).textContent = d.toLocaleTimeString();
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// 3D AGENT ANIMATIONS
// ═══════════════════════════════════════════════════════════════════════════════
function updateAgentMesh(id, state) {
  const mesh = agentMeshes[id];
  if (!mesh) return;

  const light = mesh.userData.light;
  mesh.userData.status = state.status;

  if (state.status === 'thinking') {
    light.intensity = 2.5;
    // Show bubble with incoming message
    if (state.lastMessage) {
      updateBubble(id, `💭 ${state.lastMessage}`, AGENTS_CFG[id].color);
    }
  } else if (state.status === 'responding') {
    light.intensity = 4;
    if (state.lastResponse) {
      updateBubble(id, state.lastResponse, AGENTS_CFG[id].color);
    }
  } else {
    // idle — fade out
    setTimeout(() => {
      if (bubbleSprites[id]) {
        scene.remove(bubbleSprites[id]);
        delete bubbleSprites[id];
      }
    }, 5000);
    light.intensity = 0.3;
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// WEBSOCKET CONNECTION
// ═══════════════════════════════════════════════════════════════════════════════
const wsStatus = document.getElementById('ws-status');
let ws;

function connectWS() {
  const wsUrl = `ws://${window.location.host}`;
  ws = new WebSocket(wsUrl);

  ws.onopen = () => {
    wsStatus.className = 'connected';
    wsStatus.textContent = '🟢 Live';
    console.log('[WS] Connected');
  };

  ws.onmessage = (event) => {
    try {
      const msg = JSON.parse(event.data);
      if (msg.type === 'snapshot') {
        for (const [id, state] of Object.entries(msg.agents)) {
          updateAgentCard(id, state);
          updateAgentMesh(id, state);
        }
      } else if (msg.type === 'agentUpdate') {
        updateAgentCard(msg.agentId, msg.state);
        updateAgentMesh(msg.agentId, msg.state);
      }
    } catch (e) {
      console.error('[WS] Parse error', e);
    }
  };

  ws.onclose = () => {
    wsStatus.className = 'disconnected';
    wsStatus.textContent = '🔴 Reconnecting…';
    setTimeout(connectWS, 3000);
  };

  ws.onerror = () => ws.close();
}

// ═══════════════════════════════════════════════════════════════════════════════
// ANIMATION LOOP
// ═══════════════════════════════════════════════════════════════════════════════
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  // Float all agents
  for (const [id, mesh] of Object.entries(agentMeshes)) {
    const off = mesh.userData.floatOffset;
    const status = mesh.userData.status || 'idle';
    const cfg = AGENTS_CFG[id];
    const [px, , pz] = cfg.pos;

    if (status === 'idle') {
      mesh.position.y = 1.7 + Math.sin(t * 0.8 + off) * 0.12;
      mesh.rotation.y = Math.sin(t * 0.3 + off) * 0.15;
    } else if (status === 'thinking') {
      mesh.position.y = 1.7 + Math.sin(t * 2.5 + off) * 0.08;
      mesh.rotation.y += 0.02;
    } else if (status === 'responding') {
      mesh.position.y = 1.7 + 0.25 + Math.sin(t * 4 + off) * 0.05;
      mesh.rotation.y += 0.015;
    }

    // Atlas world rotation
    if (id === 'main' && mesh.userData.worldGroup) {
      mesh.userData.worldGroup.rotation.y = t * 0.5;
    }

    // Vulkan hammer swing when active
    if (id === 'vulkan' && mesh.userData.hammerGroup) {
      if (status === 'thinking') {
        mesh.userData.hammerGroup.rotation.z = -0.5 + Math.sin(t * 6) * 0.6;
      } else {
        mesh.userData.hammerGroup.rotation.z = -0.5 + Math.sin(t * 0.8) * 0.2;
      }
    }

    // Saga scroll bob + runes orbit
    if (id === 'saga' && mesh.userData.runes) {
      mesh.userData.runes.forEach((rune, i) => {
        const a = (i / 5) * Math.PI * 2 + t * (status === 'thinking' ? 2 : 0.5);
        const radius = status === 'responding' ? 1.1 : 0.75;
        rune.position.x = Math.cos(a) * radius;
        rune.position.z = Math.sin(a) * radius;
        rune.position.y = 0.5 + Math.sin(t * 2 + i) * 0.2;
        rune.rotation.y = t * 3;
      });
    }

    // Update bubble position
    if (bubbleSprites[id]) {
      bubbleSprites[id].position.x = mesh.position.x;
      bubbleSprites[id].position.y = mesh.position.y + 4.0;
      bubbleSprites[id].position.z = mesh.position.z;
    }
  }

  // Fire particles
  if (fireParticles && firePositions) {
    const pos = fireParticles.geometry.attributes.position;
    for (let i = 0; i < firePositions.length / 3; i++) {
      pos.array[i * 3 + 1] += 0.02 + Math.random() * 0.02;
      pos.array[i * 3]     += (Math.random() - 0.5) * 0.01;
      if (pos.array[i * 3 + 1] > -8 + 1.8) {
        // reset to base
        pos.array[i * 3]     = -8 + 1.2 + (Math.random() - 0.5) * 0.6;
        pos.array[i * 3 + 1] = 0.15;
        pos.array[i * 3 + 2] = -6 + (Math.random() - 0.5) * 0.6;
      }
    }
    pos.needsUpdate = true;
  }

  // Rune particles for Saga
  if (sagaRuneParticles) {
    const pos = sagaRuneParticles.geometry.attributes.position;
    for (let i = 0; i < 40; i++) {
      pos.array[i * 3 + 1] += 0.01;
      if (pos.array[i * 3 + 1] > 2.5) {
        pos.array[i * 3 + 1] = 0;
        pos.array[i * 3]     = 8 + (Math.random() - 0.5) * 3;
        pos.array[i * 3 + 2] = -6 + (Math.random() - 0.5) * 3;
      }
    }
    pos.needsUpdate = true;
  }

  // Flicker fire lights
  if (scene.userData.flickerLights) {
    for (const fl of scene.userData.flickerLights) {
      fl.userData.flicker += 0.1;
      fl.intensity = 3 + Math.sin(fl.userData.flicker * 7.3) * 1.2 + Math.sin(fl.userData.flicker * 11.7) * 0.5;
    }
  }

  controls.update();
  renderer.render(scene, camera);
}

// ═══════════════════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════════════════
function init() {
  buildSky();
  buildGround();
  buildColumns();
  buildAltar();
  buildZones();

  for (const [id, cfg] of Object.entries(AGENTS_CFG)) {
    buildAgentMesh(id, cfg);
  }

  buildFireParticles(-8, -6);
  buildSagaRunes(8, -6);
  buildAgentCards();
  connectWS();
  animate();

  // Hide loading
  setTimeout(() => {
    const loading = document.getElementById('loading');
    loading.style.opacity = '0';
    setTimeout(() => loading.style.display = 'none', 500);
  }, 800);
}

init();
